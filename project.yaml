name: real-time-kafka-spark-streaming
owner: Engr-InamUllah
status: scaffold
stack: 'Apache Kafka, Spark Structured Streaming, Delta Lake'
pipeline:
  - produce
  - consume
  - validate
  - aggregate
  - checkpoint
